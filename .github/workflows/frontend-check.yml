name: Frontend Check

on:
  push:
    paths:
      - 'nvr-dashboard/app/**'
      - '.github/workflows/frontend-check.yml'
  pull_request:
    paths:
      - 'nvr-dashboard/app/**'
      - '.github/workflows/frontend-check.yml'

jobs:
  frontend-check:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nvr-dashboard/app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: nvr-dashboard/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run type check
        run: npm run type-check
