name: Rust Check

on:
  push:
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust-check.yml'
  pull_request:
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust-check.yml'

jobs:
  rust-check:
    name: Check and Test
    runs-on: ubuntu-latest
    env:
      # Override .cargo/config.toml default ("ffmpeg"), use CI-downloaded FFmpeg 7.x.
      FFMPEG_DIR: /opt/ffmpeg
      PKG_CONFIG_PATH: /opt/ffmpeg/lib/pkgconfig
      LD_LIBRARY_PATH: /opt/ffmpeg/lib
      FFMPEG_PACKAGE: ffmpeg-n7.1-latest-linux64-gpl-shared-7.1.tar.xz
      FFMPEG_PACKAGE_FALLBACK: ffmpeg-n7.1-latest-linux64-gpl-shared.tar.xz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: nvr-dashboard/app/package-lock.json

      - name: Install download dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            curl \
            jq \
            tar \
            xz-utils \
            unzip

      - name: Cache FFmpeg build
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: /opt/ffmpeg
          key: ffmpeg-btbn-${{ runner.os }}-${{ env.FFMPEG_PACKAGE }}

      - name: Download and install FFmpeg from BtbN releases
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          BASE_URL="https://github.com/BtbN/FFmpeg-Builds/releases/download/latest"
          ASSET_URL="${BASE_URL}/${FFMPEG_PACKAGE}"
          FALLBACK_URL="${BASE_URL}/${FFMPEG_PACKAGE_FALLBACK}"

          if ! curl -fL "${ASSET_URL}" -o /tmp/ffmpeg.tar.xz; then
            curl -fL "${FALLBACK_URL}" -o /tmp/ffmpeg.tar.xz
          fi
          rm -rf /tmp/ffmpeg-extract
          mkdir -p /tmp/ffmpeg-extract
          tar -xf /tmp/ffmpeg.tar.xz -C /tmp/ffmpeg-extract
          ROOT_DIR="$(find /tmp/ffmpeg-extract -mindepth 1 -maxdepth 1 -type d | head -n1)"

          if [ -z "${ROOT_DIR}" ]; then
            echo "Extracted FFmpeg directory not found" >&2
            exit 1
          fi

          sudo rm -rf "${FFMPEG_DIR}"
          sudo mkdir -p "${FFMPEG_DIR}"
          sudo cp -a "${ROOT_DIR}/." "${FFMPEG_DIR}/"

      - name: Verify FFmpeg installation
        run: |
          set -euxo pipefail
          "${FFMPEG_DIR}/bin/ffmpeg" -version | head -n1
          test -f "${FFMPEG_DIR}/include/libavutil/avutil.h"
          test -f "${FFMPEG_DIR}/lib/pkgconfig/libavutil.pc"

      # ZLMediaKit is fetched by rszlm-sys's build script — the prebuilt archive
      # pinned via ZLM_RELEASE_URL in .cargo/config.toml — exactly as in local
      # dev. Do NOT pre-download it here or set ZLM_DIR: the asset picked from
      # `releases/latest` was a transcode build linked against FFmpeg 4.x
      # (libavutil.so.56), which clashed with the FFmpeg 7.x installed above and
      # broke `cargo test` when the nvr binary loaded libmk_api.so (exit 127).

      - name: Build embedded dashboard assets
        working-directory: nvr-dashboard/app
        run: |
          npm ci
          npm run build

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cargo check (workspace)
        run: cargo check --workspace

      - name: Cargo test (workspace, no doctest, skip bin harness)
        run: cargo test --workspace --lib --tests --no-fail-fast

      # SMB backend is behind the optional `smb` feature (links libsmbclient).
      # Verify it still compiles, with the system lib installed only for this step.
      - name: Cargo check (smb feature)
        run: |
          sudo apt-get install -y libsmbclient-dev
          cargo check -p nvr --features smb
