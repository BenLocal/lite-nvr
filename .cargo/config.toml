[env]
FFMPEG_DIR = { value = "ffmpeg", relative = true }

# 本地开发：用本地 ./zlm 安装（ZLM_DIR 优先级最高，会盖过下面的预编译下载）。
# 需要本地构建 ZLMediaKit 时取消注释下一行即可。
# ZLM_DIR = { value = "zlm", relative = true }

# 默认（CI / 下游 / 无本地安装）：从 ZLMediaKit-Build releases 下载预编译产物（动态库）。
# 固定到具体 tag，避免 releases/latest 重定向跳过 prerelease 命中旧版本。
ZLM_RELEASE_URL = "https://github.com/BenLocal/ZLMediaKit-Build/releases/download/autobuild-2026-06-24"

# Linux x86_64
[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C",
    "link-arg=-Wl,-rpath-link,ffmpeg/lib",
    "-C",
    "link-arg=-Wl,-rpath,$ORIGIN/../ffmpeg/lib",
]

# Linux aarch64
[target.aarch64-unknown-linux-gnu]
rustflags = [
    "-C",
    "link-arg=-Wl,-rpath-link,ffmpeg/lib",
    "-C",
    "link-arg=-Wl,-rpath,$ORIGIN/../ffmpeg/lib",
]

# macOS x86_64
[target.x86_64-apple-darwin]
rustflags = [
    "-C",
    "link-arg=-Wl,-rpath,@executable_path/../ffmpeg/lib",
    "-C",
    "link-arg=-Wl,-rpath,@executable_path/../../ffmpeg/lib",
    "-C",
    "link-arg=-Wl,-rpath,@executable_path/../../zlm/lib",
]

# macOS aarch64 (Apple Silicon)
[target.aarch64-apple-darwin]
rustflags = [
    "-C",
    "link-arg=-Wl,-rpath,@executable_path/../ffmpeg/lib",
    "-C",
    "link-arg=-Wl,-rpath,@executable_path/../../ffmpeg/lib",
    "-C",
    "link-arg=-Wl,-rpath,@executable_path/../../zlm/lib",
]

# Windows x86_64 MSVC
[target.x86_64-pc-windows-msvc]
rustflags = []

# Windows aarch64 MSVC
[target.aarch64-pc-windows-msvc]
rustflags = []
